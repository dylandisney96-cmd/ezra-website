<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Body -->
  <ellipse cx="100" cy="175" rx="50" ry="55" fill="#1a1a2e" stroke="#ff1493" stroke-width="2"/>
  <!-- Suit lapels -->
  <path d="M100 130 L80 175 L100 160 L120 175 L100 130" fill="#0a0a1a" stroke="#ff1493" stroke-width="1"/>
  <!-- Collar / tie -->
  <rect x="95" y="130" width="10" height="35" rx="3" fill="#ff1493"/>
  <!-- Head -->
  <circle cx="100" cy="85" r="40" fill="#1a1a2e" stroke="#ff1493" stroke-width="2"/>
  <!-- Hair -->
  <path d="M60 80 Q60 45 100 40 Q140 45 140 80" fill="#0a0a1a" stroke="#ff1493" stroke-width="1"/>
  <!-- Eyes -->
  <ellipse cx="85" cy="80" rx="6" ry="5" fill="white"/>
  <ellipse cx="115" cy="80" rx="6" ry="5" fill="white"/>
  <circle cx="86" cy="80" r="3" fill="#ff1493"/>
  <circle cx="116" cy="80" r="3" fill="#ff1493"/>
  <!-- Glasses -->
  <rect x="76" y="74" width="18" height="14" rx="4" stroke="#ff69b4" stroke-width="1.5" fill="none"/>
  <rect x="106" y="74" width="18" height="14" rx="4" stroke="#ff69b4" stroke-width="1.5" fill="none"/>
  <line x1="94" y1="81" x2="106" y2="81" stroke="#ff69b4" stroke-width="1.5"/>
  <!-- Eyebrows -->
  <path d="M78 72 Q85 68 92 72" stroke="#ff69b4" stroke-width="1.5" fill="none" class="mascot-eyebrow"/>
  <path d="M108 72 Q115 68 122 72" stroke="#ff69b4" stroke-width="1.5" fill="none" class="mascot-eyebrow"/>
  <!-- Smile -->
  <path d="M85 95 Q100 108 115 95" stroke="#ff69b4" stroke-width="2" fill="none" class="mascot-mouth"/>
  <!-- Blush -->
  <ellipse cx="75" cy="92" rx="6" ry="4" fill="#ff1493" opacity="0.3"/>
  <ellipse cx="125" cy="92" rx="6" ry="4" fill="#ff1493" opacity="0.3"/>
  <!-- Left Arm -->
  <path d="M50 155 Q20 140 15 120" stroke="#1a1a2e" stroke-width="10" stroke-linecap="round" fill="none" class="mascot-arm"/>
  <circle cx="15" cy="118" r="6" fill="#1a1a2e"/>
  <!-- Right Arm (waving) -->
  <path d="M150 155 Q180 130 175 100" stroke="#1a1a2e" stroke-width="10" stroke-linecap="round" fill="none" class="mascot-arm"/>
  <circle cx="175" cy="98" r="6" fill="#1a1a2e"/>
  <!-- Legs -->
  <rect x="80" y="220" width="16" height="20" rx="4" fill="#0a0a1a"/>
  <rect x="104" y="220" width="16" height="20" rx="4" fill="#0a0a1a"/>
  <!-- Shoes -->
  <rect x="78" y="236" width="22" height="8" rx="4" fill="#ff1493"/>
  <rect x="100" y="236" width="22" height="8" rx="4" fill="#ff1493"/>
  <!-- Sparkle dots -->
  <circle cx="35" cy="60" r="3" fill="#ff69b4" opacity="0.6"/>
  <circle cx="165" cy="55" r="2" fill="#ff69b4" opacity="0.4"/>
  <circle cx="30" cy="100" r="2" fill="#ff69b4" opacity="0.3"/>
  <circle cx="170" cy="90" r="3" fill="#ff69b4" opacity="0.5"/>
  <!-- Pink bumper guard on chest (as a tie detail) -->
  <rect x="50" y="175" width="100" height="4" rx="2" fill="#ff1493" opacity="0.4"/>
</svg>
